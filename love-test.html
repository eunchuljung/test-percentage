<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>너 연애에서 호구력 몇 %?</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="너 연애에서 호구력 몇 %?">
    <meta property="og:description" content="사랑 앞에서 당하고만 사는 너의 호구력을 측정해봄">
    <meta property="og:image" content="https://via.placeholder.com/800x400?text=연애+호구력+테스트">
    <meta property="og:url" content="">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.8.0/countUp.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2.5px solid #8b5cf6;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .start-screen { padding: 60px 40px; text-align: center; }
        .start-screen h1 { 
            font-size: 28px; 
            color: #ffffff; 
            margin-bottom: 20px; 
            line-height: 1.4; 
            text-shadow: 0 3px 10px rgba(0,0,0,0.5); 
            font-weight: bold; 
        }
        .start-screen p { 
            font-size: 16px; 
            color: #f0f0ff; 
            margin-bottom: 40px; 
            line-height: 1.6; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }
        
        .participant-count {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #8b5cf6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #e9d5ff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .participant-count strong {
            font-size: 24px;
            color: #fbbf24;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            border: 2.5px solid #8b5cf6;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .start-btn:hover { 
            transform: scale(1.05); 
            border-color: #a78bfa;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .question-screen { display: none; padding: 40px; }
        
        .progress-bar { 
            height: 8px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 10px; 
            margin-bottom: 30px; 
            overflow: hidden; 
            border: 1px solid rgba(167, 139, 250, 0.3);
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%); 
            width: 0%; 
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        
        .question-number { 
            font-size: 14px; 
            color: #c4b5fd; 
            margin-bottom: 10px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            font-weight: 600;
        }
        .question-text { 
            font-size: 22px; 
            color: #ffffff; 
            margin-bottom: 40px; 
            line-height: 1.5; 
            font-weight: bold; 
            text-shadow: 0 3px 10px rgba(0,0,0,0.5); 
        }
        
        .answer-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2.5px solid #8b5cf6;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        
        .answer-btn:hover {
            border: 3px solid #a78bfa;
            background: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .result-screen { display: none; padding: 40px; }
        
        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid rgba(167, 139, 250, 0.5);
        }
        
        .result-percentage { 
            font-size: 72px; 
            color: #fbbf24; 
            font-weight: bold; 
            margin-bottom: 10px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .result-title { 
            font-size: 24px; 
            color: white; 
            font-weight: bold; 
            margin-bottom: 10px; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }
        .result-summary { 
            font-size: 16px; 
            color: #f0f0ff; 
            margin-bottom: 20px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.3); 
        }
        .result-message { 
            background: rgba(255,255,255,0.2); 
            padding: 20px; 
            border-radius: 10px; 
            color: white; 
            line-height: 1.6; 
            font-size: 15px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            border: 1px solid rgba(167, 139, 250, 0.3);
        }
        
        .ad-banner { display: none; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            font-weight: bold; 
        }
        .save-btn { background: #10b981; color: white; }
        .share-btn { background: #fbbf24; color: #1f2937; }
        .action-btn:hover { transform: scale(1.05); }
        
        .other-tests {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(167, 139, 250, 0.4);
            padding: 30px;
            border-radius: 15px;
        }
        
        .other-tests h3 { 
            font-size: 18px; 
            margin-bottom: 20px; 
            color: #ffffff; 
            font-weight: bold; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }
        
        .test-item {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(167, 139, 250, 0.5);
        }
        
        .test-item:hover { 
            transform: translateX(5px); 
            border-color: #c4b5fd; 
            background: rgba(196, 181, 253, 0.3); 
        }
        .test-item-title { 
            font-size: 16px; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 5px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.3); 
        }
        .test-item-desc { 
            font-size: 14px; 
            color: #f0f0ff; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.2); 
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-screen" id="startScreen">
            <h1>너 연애에서 호구력 몇 %?</h1>
            <p>사랑 앞에서 당하고만 사는 너의 호구력을 측정해봄</p>
            <div class="participant-count">지금까지 <strong id="participantCount">0</strong>명이 참여했어요</div>
            <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
        </div>
        
        <div class="question-screen" id="questionScreen">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="question-number" id="questionNumber">질문 1/10</div>
            <div class="question-text" id="questionText"></div>
            <button class="answer-btn" id="answerA" onclick="selectAnswer('A')"></button>
            <button class="answer-btn" id="answerB" onclick="selectAnswer('B')"></button>
        </div>
        
        <div class="result-screen" id="resultScreen">
            <div class="result-card" id="resultCard">
                <div class="result-percentage" id="resultPercentage">0%</div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-summary" id="resultSummary"></div>
                <div class="result-message" id="resultMessage"></div>
            </div>
            <div class="action-buttons">
                <button class="action-btn save-btn" onclick="saveAsImage()">이미지 저장</button>
                <button class="action-btn share-btn" onclick="shareKakao()">카톡 공유</button>
            </div>
            <div class="other-tests">
                <h3>다른 테스트도 해볼래?</h3>
                <div class="test-item" onclick="location.href='work-test.html'">
                    <div class="test-item-title">너 회사에서 욕먹을 확률 몇 %?</div>
                    <div class="test-item-desc">동료들 단톡방에서 네 얘기 나올 확률 측정</div>
                </div>
                <div class="test-item" onclick="location.href='relationship-test.html'">
                    <div class="test-item-title">너 인간관계에서 얼마나 밀림?</div>
                    <div class="test-item-desc">사람들한테 만만하게 보이는 정도 측정</div>
                </div>
                <div class="test-item" onclick="location.href='spending-test.html'">
                    <div class="test-item-title">너 충동소비 지수 몇 %?</div>
                    <div class="test-item-desc">카드 긁을 때 이성 잃는 정도 측정</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const testData = {
            questions: [
                { question: "{nickname}, 상대가 오늘 진짜 피곤하다고 하면? 💤", answers: { A: "알았어 쉬어", B: "야 무슨 일인데" }},
                { question: "약속 당일 갑자기 취소 ❌", answers: { A: "ㅇㅋ 괜찮아~", B: "나 옷 다 갈아입었는데??" }},
                { question: "전 애인 얘기 또 꺼냄 😒", answers: { A: "그냥 들어줌", B: "야 그만 좀 해라" }},
                { question: "읽씹 5시간째 👻", answers: { A: "바쁘겠지 기다림", B: "?? 왜 안 봐" }},
                { question: "{nickname}, 또 친구 약속 우선하면 어떻게 할래? 🎉", answers: { A: "그래 재밌게 놀다 와", B: "어 우리 언제 봄?" }},
                { question: "싸우고 사과 없이 일상 톡 💬", answers: { A: "그냥 답장함", B: "야 우리 싸웠잖아" }},
                { question: "데이트값 또 내가 계산 💳", answers: { A: "내가 내고 싶어서", B: "오늘은 너 낼래?" }},
                { question: "우리 연락 좀 줄이자 🥶", answers: { A: "응 알았어...", B: "갑자기 왜? 나 때문?" }},
                { question: "중요한 날 축하 없음 🎂", answers: { A: "바쁠 수도 있지", B: "야 오늘 무슨 날인지 알아?" }},
                { question: "SNS에 다른 이성이랑 사진 👀", answers: { A: "친구겠지...", B: "야 저 사람 누구야?" }}
            ],
            results: [
                { range: [0, 20], title: "💪 {nickname}는 연애 프로급 자존감", summary: "호구력 거의 제로", message: "당하고 사는 거 진심 싫어하는 타입. 상대가 선 넘으면 바로 말함. 오히려 상대가 너 눈치 보는 수준ㅋㅋ" },
                { range: [21, 40], title: "👍 {nickname}는 어느 정도 선은 지키는 편", summary: "호구력 낮음", message: "기본적으론 안 당하고 살지만 애정 가면 좀 봐줄 수도 있는 사람. 선 넘으면 확실히 표현하는 스타일." },
                { range: [41, 60], title: "😅 {nickname}는 애매하게 당하는 중", summary: "호구력 중간", message: "불편한 건 있는데 말 못 하는 타입. \"이번만...\" 하다가 계속 참게 됨. 상대가 슬쩍 이용할 여지 남겨둠." },
                { range: [61, 80], title: "😢 {nickname}는 사랑 앞에서 너무 착함", summary: "호구력 높음", message: "진심으로 좋아하면 다 참아주는 타입. 약속 취소해도 연락 안 해도 \"바쁜가보네\" 하고 넘어감. 너 감정도 중요함." },
                { range: [81, 94], title: "😭 {nickname}는 완벽한 연애 호구", summary: "호구력 상위권", message: "축하함 너 호구 맞음ㅋㅋ 뭘 해도 \"괜찮아\" 하면서 받아줌. 이러다 진짜 이용만 당하고 버려질 수 있음. 자존감 좀 챙겨." },
                { range: [95, 100], title: "🚨 {nickname}는 레전드급 연애 호구", summary: "호구력 극한", message: "이 정도 점수 처음 봄ㅋㅋㅋ 너 자신이 소중하다는 걸 진짜 모르는 듯. 상대가 아무리 막 대해도 다 받아줌? 지금 당장 관계 다시 봐. 너 소중해." }
            ]
        };
        
        let currentQuestion = 0, score = 0;
        
        // 닉네임 가져오기
        function getNickname() {
            const nickname = localStorage.getItem('testNickname');
            return nickname ? nickname + '야' : '너';
        }
        
        // 페이지 로드 시 참여자 수 카운트업
        window.addEventListener('DOMContentLoaded', function() {
            const countUp = new CountUp('participantCount', 15247 + Math.floor(Math.random() * 50), { duration: 2, separator: ',' });
            countUp.start();
        });
        
        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'block';
            showQuestion(0);
        }
        
        function showQuestion(index) {
            const q = testData.questions[index];
            const nickname = getNickname();
            
            document.getElementById('questionNumber').textContent = `질문 ${index + 1}/10`;
            document.getElementById('questionText').textContent = q.question.replace('{nickname}', nickname);
            document.getElementById('answerA').textContent = q.answers.A;
            document.getElementById('answerB').textContent = q.answers.B;
            document.getElementById('progressFill').style.width = ((index + 1) / 10) * 100 + '%';
        }
        
        function selectAnswer(answer) {
            if (answer === 'A') score += 10;
            currentQuestion++;
            currentQuestion < testData.questions.length ? showQuestion(currentQuestion) : showResult();
        }
        
        function showResult() {
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            const nickname = localStorage.getItem('testNickname') || '너';
            const result = testData.results.find(r => score >= r.range[0] && score <= r.range[1]);
            
            document.getElementById('resultPercentage').textContent = score + '%';
            document.getElementById('resultTitle').textContent = result.title.replace('{nickname}', nickname);
            document.getElementById('resultSummary').textContent = result.summary;
            document.getElementById('resultMessage').textContent = result.message;
        }
        
        function saveAsImage() {
            html2canvas(document.getElementById('resultCard'), { scale: 2, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = '연애_호구력_결과.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        
        function shareKakao() {
            alert('카카오톡 공유 기능은 카카오 개발자 등록 후 사용 가능합니다.\n지금은 URL 복사로 대체됩니다.');
            navigator.clipboard.writeText(window.location.href).then(() => alert('URL이 복사되었습니다!'));
        }
    </script>
</body>
</html>
