<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>너 연애에서 호구력 몇 %?</title>

    <!-- OG 태그 -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="너 연애에서 호구력 몇 %?">
    <meta property="og:description" content="사랑 앞에서 당하고만 사는 너의 호구력을 측정해봄">
    <meta property="og:image" content="https://test-percentage.vercel.app/og-image.png">
    <meta property="og:url" content="https://test-percentage.vercel.app/love-test.html">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        /* ── 변수 & 리셋 ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #FFB3AB;       /* Candy Peach — 연애 테마 */
            --accent-dark: #e8928a;
            --black: #1B1B1B;
            --white: #FFFFFF;
            --gray: rgba(27,27,27,0.45);
            --bg: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0 0 60px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
        }

        /* ── 상단 컬러 바 ── */
        .color-bar {
            height: 6px;
            background: var(--accent);
            width: 100%;
        }

        /* ── 시작 화면 ── */
        .start-screen {
            padding: 48px 24px 40px;
            text-align: center;
        }

        .start-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--black);
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 28px;
        }

        .start-screen h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--black);
            line-height: 1.3;
            margin-bottom: 14px;
        }

        .start-screen p {
            font-size: 15px;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .start-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .start-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 6px 20px rgba(27,27,27,0.2);
        }

        /* ── 질문 화면 ── */
        .question-screen {
            display: none;
            padding: 32px 24px;
        }

        /* 진행 바 — 테마 컬러 */
        .progress-wrap {
            margin-bottom: 32px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(27,27,27,0.08);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 100px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 800;
            color: var(--black);
            line-height: 1.45;
            margin-bottom: 36px;
        }

        /* 선택지 버튼 */
        .answer-btn {
            width: 100%;
            background: var(--white);
            border: 2px solid rgba(27,27,27,0.1);
            padding: 18px 20px;
            margin-bottom: 12px;
            border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--black);
            text-align: left;
            line-height: 1.5;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }

        .answer-btn:hover {
            border-color: var(--accent);
            background: #FFF5F4;
            transform: scale(0.99);
        }

        .answer-btn:active {
            transform: scale(0.97);
        }

        /* ── 결과 화면 ── */
        .result-screen {
            display: none;
        }

        /* 결과 상단 — 테마 컬러 풀 배경 */
        .result-hero {
            background: var(--accent);
            padding: 52px 24px 40px;
            text-align: center;
        }

        .result-emoji {
            font-size: 72px;
            display: block;
            margin-bottom: 20px;
            line-height: 1;
        }

        /* % 숫자 — Bold + Large */
        .result-percentage {
            font-size: 80px;
            font-weight: 900;
            color: var(--black);
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .result-summary {
            font-size: 14px;
            font-weight: 600;
            color: rgba(27,27,27,0.55);
        }

        /* 결과 본문 */
        .result-body {
            padding: 28px 24px;
        }

        .result-message {
            background: rgba(27,27,27,0.04);
            border-radius: 16px;
            padding: 20px;
            font-size: 15px;
            color: var(--black);
            line-height: 1.75;
            margin-bottom: 24px;
        }

        /* 공유/저장 버튼 */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .action-btn:hover { transform: scale(0.97); }

        .save-btn {
            background: rgba(27,27,27,0.06);
            color: var(--black);
        }

        .share-btn {
            background: var(--black);
            color: var(--white);
        }

        /* 다른 테스트 목록 */
        .other-tests h3 {
            font-size: 16px;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 14px;
        }

        .test-item {
            border: 2px solid rgba(27,27,27,0.08);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .test-item:hover {
            border-color: var(--accent);
            transform: scale(0.99);
        }

        .test-item-info { flex: 1; }

        .test-item-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 3px;
        }

        .test-item-desc {
            font-size: 13px;
            color: var(--gray);
        }

        .test-item-arrow {
            font-size: 16px;
            color: var(--gray);
            flex-shrink: 0;
            margin-left: 10px;
        }

        /* 홈으로 버튼 */
        .home-btn {
            display: block;
            text-align: center;
            padding: 14px;
            border: 2px solid rgba(27,27,27,0.1);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray);
            text-decoration: none;
            margin-top: 16px;
            transition: border-color 0.15s;
        }

        .home-btn:hover { border-color: var(--black); color: var(--black); }

        /* 애니메이션 */
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes shake  { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        .anim-pulse   { animation: pulse  1.5s ease-in-out infinite; }
        .anim-shake   { animation: shake  0.8s ease-in-out infinite; }
        .anim-bounce  { animation: bounce 1.0s ease-in-out infinite; }

        /* 페이드 전환 & 결과 진입 */
        @keyframes resultEntrance {
            0% { opacity: 0; transform: scale(0.9) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-entrance { animation: resultEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>
<div class="container">
    <!-- 상단 컬러 바 -->
    <div class="color-bar"></div>

    <!-- ① 시작 화면 -->
    <div class="start-screen" id="startScreen">
        <span class="start-badge">💘 연애</span>
        <h1>너 연애에서<br>호구력 몇 %?</h1>
        <p>사랑 앞에서 당하고만 사는<br>너의 호구력을 측정해봄</p>
        <button class="start-btn" onclick="startTest()">테스트 시작하기 →</button>
    </div>

    <!-- ② 질문 화면 -->
    <div class="question-screen" id="questionScreen">
        <div class="progress-wrap">
            <div class="progress-label">
                <span id="questionNumber">질문 1 / 10</span>
                <span id="progressPct">10%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="question-text" id="questionText"></div>
        <button class="answer-btn" id="answerA" onclick="selectAnswer('A')"></button>
        <button class="answer-btn" id="answerB" onclick="selectAnswer('B')"></button>
    </div>

    <!-- ③ 결과 화면 -->
    <div class="result-screen" id="resultScreen">
        <div id="resultContent">
            <!-- 결과 히어로 영역 -->
            <div class="result-hero" id="resultHero">
                <span class="result-emoji" id="resultEmoji"></span>
                <div class="result-percentage" id="resultPercentage">0%</div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-summary" id="resultSummary"></div>
            </div>

            <!-- 결과 본문 -->
            <div class="result-body">
                <div class="result-message" id="resultMessage"></div>

                <div class="action-buttons">
                    <button class="action-btn save-btn" onclick="saveAsImage()">📷 이미지 저장</button>
                    <button class="action-btn share-btn" onclick="shareLink()">🔗 공유하기</button>
                </div>

                <div class="other-tests">
                    <h3>다른 테스트도 해볼래?</h3>
                    <div class="test-item" onclick="location.href='work-test.html'">
                        <div class="test-item-info">
                            <div class="test-item-title">너 회사에서 욕먹을 확률 몇 %?</div>
                            <div class="test-item-desc">동료들 단톡방에서 네 얘기 나올 확률</div>
                        </div>
                        <span class="test-item-arrow">→</span>
                    </div>
                    <div class="test-item" onclick="location.href='relationship-test.html'">
                        <div class="test-item-info">
                            <div class="test-item-title">너 친구들한테 호구력 몇 %?</div>
                            <div class="test-item-desc">사람들한테 만만하게 보이는 정도</div>
                        </div>
                        <span class="test-item-arrow">→</span>
                    </div>
                    <div class="test-item" onclick="location.href='spending-test.html'">
                        <div class="test-item-info">
                            <div class="test-item-title">너 충동소비 지수 몇 %?</div>
                            <div class="test-item-desc">카드 긁을 때 이성 잃는 정도</div>
                        </div>
                        <span class="test-item-arrow">→</span>
                    </div>
                </div>

                <a href="index.html" class="home-btn">← 전체 테스트 보러 가기</a>
            </div>
        </div>
    </div>
</div>

<script>
    /* ── 질문/결과 데이터 ── */
    const testData = {
        questions: [
            { question: "{nickname}, 상대가 오늘 진짜 피곤하다고 하면? 💤", answers: { A: "알았어 쉬어", B: "야 무슨 일인데" }},
            { question: "약속 당일 갑자기 취소 ❌", answers: { A: "ㅇㅋ 괜찮아~", B: "나 옷 다 갈아입었는데??" }},
            { question: "전 애인 얘기 또 꺼냄 😒", answers: { A: "그냥 들어줌", B: "야 그만 좀 해라" }},
            { question: "읽씹 5시간째 👻", answers: { A: "바쁘겠지 기다림", B: "?? 왜 안 봐" }},
            { question: "{nickname}, 또 친구 약속 우선하면 어떻게 할래? 🎉", answers: { A: "그래 재밌게 놀다 와", B: "어 우리 언제 봄?" }},
            { question: "싸우고 사과 없이 일상 톡 💬", answers: { A: "그냥 답장함", B: "야 우리 싸웠잖아" }},
            { question: "데이트값 또 내가 계산 💳", answers: { A: "내가 내고 싶어서", B: "오늘은 너 낼래?" }},
            { question: "우리 연락 좀 줄이자 🥶", answers: { A: "응 알았어...", B: "갑자기 왜? 나 때문?" }},
            { question: "중요한 날 축하 없음 🎂", answers: { A: "바쁠 수도 있지", B: "야 오늘 무슨 날인지 알아?" }},
            { question: "SNS에 다른 이성이랑 사진 👀", answers: { A: "친구겠지...", B: "야 저 사람 누구야?" }}
        ],
        results: [
            { range:[0,20],   emoji:"💪", anim:"anim-pulse",  title:"{nickname}는 연애 프로급 자존감",   summary:"호구력 거의 제로",   message:"당하고 사는 거 진심 싫어하는 타입. 상대가 선 넘으면 바로 말함. 오히려 상대가 너 눈치 보는 수준ㅋㅋ" },
            { range:[21,40],  emoji:"👍", anim:"anim-pulse",  title:"{nickname}는 선은 지키는 편",       summary:"호구력 낮음",         message:"기본적으론 안 당하고 살지만 애정 가면 좀 봐줄 수도 있는 사람. 선 넘으면 확실히 표현하는 스타일." },
            { range:[41,60],  emoji:"😅", anim:"",            title:"{nickname}는 애매하게 당하는 중",   summary:"호구력 중간",         message:"불편한 건 있는데 말 못 하는 타입. '이번만...' 하다가 계속 참게 됨. 상대가 슬쩍 이용할 여지 남겨둠." },
            { range:[61,80],  emoji:"😢", anim:"anim-bounce", title:"{nickname}는 사랑 앞에서 너무 착함", summary:"호구력 높음",         message:"진심으로 좋아하면 다 참아주는 타입. 약속 취소해도 연락 안 해도 '바쁜가보네' 하고 넘어감. 너 감정도 중요함." },
            { range:[81,94],  emoji:"😭", anim:"anim-shake",  title:"{nickname}는 완벽한 연애 호구",     summary:"호구력 상위권",       message:"뭘 해도 '괜찮아' 하면서 받아줌. 이러다 진짜 이용만 당하고 버려질 수 있음. 자존감 좀 챙겨." },
            { range:[95,100], emoji:"🚨", anim:"anim-shake",  title:"{nickname}는 레전드급 연애 호구",   summary:"호구력 극한",         message:"이 점수 처음 봄ㅋㅋ 상대가 아무리 막 대해도 다 받아줌? 지금 당장 관계 다시 봐. 너 소중해." }
        ]
    };

    let currentQuestion = 0, score = 0;

    /* 닉네임 불러오기 */
    function getNickname() {
        return localStorage.getItem('testNickname') || '너';
    }

    /* 테스트 시작 */
    function startTest() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('questionScreen').style.display = 'block';
        showQuestion(0);
    }

    /* 질문 표시 */
    function showQuestion(index) {
        const q = testData.questions[index];
        const nick = getNickname();
        const total = testData.questions.length;
        const pct = Math.round(((index + 1) / total) * 100);

        document.getElementById('questionNumber').textContent = `질문 ${index + 1} / ${total}`;
        document.getElementById('progressPct').textContent = pct + '%';
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('questionText').textContent = q.question.replace('{nickname}', nick);
        document.getElementById('answerA').textContent = q.answers.A;
        document.getElementById('answerB').textContent = q.answers.B;

        /* 질문 페이드 인 */
        document.getElementById('questionScreen').classList.remove('fade-in');
        void document.getElementById('questionScreen').offsetWidth;
        document.getElementById('questionScreen').classList.add('fade-in');
    }

    /* 선택지 클릭 */
    function selectAnswer(answer) {
        if (answer === 'A') score += 10; // A = 호구력 높음
        currentQuestion++;
        if (currentQuestion < testData.questions.length) {
            showQuestion(currentQuestion);
        } else {
            showResult();
        }
    }

    /* 결과 표시 */
    function showResult() {
        document.getElementById('questionScreen').style.display = 'none';
        const rs = document.getElementById('resultScreen');
        rs.style.display = 'block';
        
        const rc = document.getElementById('resultContent');
        rc.classList.add('result-entrance');

        const nick = getNickname();
        const result = testData.results.find(r => score >= r.range[0] && score <= r.range[1]);

        document.getElementById('resultEmoji').textContent = result.emoji;
        document.getElementById('resultEmoji').className = 'result-emoji ' + result.anim;
        
        // 점수 카운트업 애니메이션
        animateValue("resultPercentage", 0, score, 1500);
        
        document.getElementById('resultTitle').textContent = result.title.replace('{nickname}', nick);
        document.getElementById('resultSummary').textContent = result.summary;
        document.getElementById('resultMessage').textContent = result.message;
    }

    /* 카운트업 함수 */
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            // Easing: easeOutExpo
            const val = progress === 1 ? end : Math.floor(end * (1 - Math.pow(2, -10 * progress)));
            obj.innerHTML = val + "%";
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    /* 이미지 저장 */
    function saveAsImage() {
        html2canvas(document.getElementById('resultHero'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = '연애_호구력_결과.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    /* 링크 복사 */
    function shareLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert('링크가 복사되었어요! 친구한테 공유해봐 👀');
        });
    }
</script>
</body>
</html>
