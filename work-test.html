<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>너 회사에서 욕먹을 확률 몇 %?</title>
    <meta property="og:title" content="너 회사에서 욕먹을 확률 몇 %?">
    <meta property="og:description" content="동료들 단톡방에서 네 얘기 나올 확률 측정">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --accent:#1B1B1B; --accent-light:#2d2d2d; --black:#1B1B1B; --white:#FFFFFF; --gray:rgba(27,27,27,0.45); --bg:#FFFFFF; }
        body { font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:0 0 60px; }
        .container { width:100%; max-width:420px; min-height:100vh; }
        .color-bar { height:6px; background:var(--accent); }
        .start-screen { padding:48px 24px 40px; text-align:center; }
        .start-badge { display:inline-block; background:var(--black); color:var(--white); font-size:13px; font-weight:700; padding:6px 14px; border-radius:100px; margin-bottom:28px; }
        .start-screen h1 { font-size:28px; font-weight:900; color:var(--black); line-height:1.3; margin-bottom:14px; }
        .start-screen p { font-size:15px; color:var(--gray); line-height:1.7; margin-bottom:40px; }
        .start-btn { display:block; width:100%; padding:18px; background:var(--black); color:var(--white); border:none; border-radius:14px; font-family:'Pretendard',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; }
        .start-btn:hover { transform:scale(0.98); box-shadow:0 6px 20px rgba(27,27,27,0.25); }
        .question-screen { display:none; padding:32px 24px; }
        .progress-wrap { margin-bottom:32px; }
        .progress-label { display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:var(--gray); margin-bottom:10px; }
        .progress-bar { height:6px; background:rgba(27,27,27,0.08); border-radius:100px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--black); width:0%; transition:width 0.3s; border-radius:100px; }
        .question-text { font-size:22px; font-weight:800; color:var(--black); line-height:1.45; margin-bottom:36px; }
        .answer-btn { width:100%; background:var(--white); border:2px solid rgba(27,27,27,0.1); padding:18px 20px; margin-bottom:12px; border-radius:14px; font-family:'Pretendard',sans-serif; font-size:16px; font-weight:600; color:var(--black); text-align:left; line-height:1.5; cursor:pointer; transition:border-color 0.15s,background 0.15s,transform 0.1s; }
        .answer-btn:hover { border-color:var(--black); background:#f5f5f5; transform:scale(0.99); }
        .result-screen { display:none; }
        .result-hero { background:var(--black); padding:52px 24px 40px; text-align:center; }
        .result-emoji { font-size:72px; display:block; margin-bottom:20px; line-height:1; }
        .result-percentage { font-size:80px; font-weight:900; color:var(--white); line-height:1; margin-bottom:8px; letter-spacing:-2px; }
        .result-title { font-size:20px; font-weight:800; color:var(--white); margin-bottom:6px; line-height:1.3; }
        .result-summary { font-size:14px; font-weight:600; color:rgba(255,255,255,0.5); }
        .result-body { padding:28px 24px; }
        .result-message { background:rgba(27,27,27,0.04); border-radius:16px; padding:20px; font-size:15px; color:var(--black); line-height:1.75; margin-bottom:24px; }
        .action-buttons { display:flex; gap:10px; margin-bottom:32px; }
        .action-btn { flex:1; padding:15px; border:none; border-radius:12px; font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:transform 0.15s; }
        .action-btn:hover { transform:scale(0.97); }
        .save-btn { background:rgba(27,27,27,0.06); color:var(--black); }
        .share-btn { background:var(--black); color:var(--white); }
        .other-tests h3 { font-size:16px; font-weight:800; color:var(--black); margin-bottom:14px; }
        .test-item { border:2px solid rgba(27,27,27,0.08); border-radius:14px; padding:16px 18px; margin-bottom:10px; cursor:pointer; transition:border-color 0.15s,transform 0.1s; display:flex; justify-content:space-between; align-items:center; }
        .test-item:hover { border-color:var(--black); transform:scale(0.99); }
        .test-item-title { font-size:14px; font-weight:700; color:var(--black); margin-bottom:3px; }
        .test-item-desc { font-size:13px; color:var(--gray); }
        .test-item-arrow { font-size:16px; color:var(--gray); flex-shrink:0; margin-left:10px; }
        .home-btn { display:block; text-align:center; padding:14px; border:2px solid rgba(27,27,27,0.1); border-radius:12px; font-size:14px; font-weight:600; color:var(--gray); text-decoration:none; margin-top:16px; transition:border-color 0.15s; }
        .home-btn:hover { border-color:var(--black); color:var(--black); }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes shake { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .anim-pulse { animation:pulse 1.5s ease-in-out infinite; }
        .anim-shake { animation:shake 0.8s ease-in-out infinite; }
        .anim-bounce { animation:bounce 1.0s ease-in-out infinite; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation:fadeIn 0.3s ease; }
    </style>
</head>
<body>
<div class="container">
    <div class="color-bar"></div>
    <div class="start-screen" id="startScreen">
        <span class="start-badge">💼 직장</span>
        <h1>너 회사에서<br>욕먹을 확률 몇 %?</h1>
        <p>동료들 단톡방에서 네 얘기<br>나올 확률 측정</p>
        <button class="start-btn" onclick="startTest()">테스트 시작하기 →</button>
    </div>
    <div class="question-screen" id="questionScreen">
        <div class="progress-wrap">
            <div class="progress-label"><span id="questionNumber">질문 1 / 10</span><span id="progressPct">10%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="question-text" id="questionText"></div>
        <button class="answer-btn" id="answerA" onclick="selectAnswer('A')"></button>
        <button class="answer-btn" id="answerB" onclick="selectAnswer('B')"></button>
    </div>
    <div class="result-screen" id="resultScreen">
        <div class="result-hero" id="resultHero">
            <span class="result-emoji" id="resultEmoji"></span>
            <div class="result-percentage" id="resultPercentage">0%</div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-summary" id="resultSummary"></div>
        </div>
        <div class="result-body">
            <div class="result-message" id="resultMessage"></div>
            <div class="action-buttons">
                <button class="action-btn save-btn" onclick="saveAsImage()">📷 이미지 저장</button>
                <button class="action-btn share-btn" onclick="shareLink()">🔗 공유하기</button>
            </div>
            <div class="other-tests">
                <h3>다른 테스트도 해볼래?</h3>
                <div class="test-item" onclick="location.href='love-test.html'"><div class="test-item-info"><div class="test-item-title">너 연애에서 호구력 몇 %?</div><div class="test-item-desc">사랑 앞에서 당하고만 사는 정도</div></div><span class="test-item-arrow">→</span></div>
                <div class="test-item" onclick="location.href='relationship-test.html'"><div class="test-item-info"><div class="test-item-title">너 친구들한테 호구력 몇 %?</div><div class="test-item-desc">사람들한테 만만하게 보이는 정도</div></div><span class="test-item-arrow">→</span></div>
                <div class="test-item" onclick="location.href='spending-test.html'"><div class="test-item-info"><div class="test-item-title">너 충동소비 지수 몇 %?</div><div class="test-item-desc">카드 긁을 때 이성 잃는 정도</div></div><span class="test-item-arrow">→</span></div>
            </div>
            <a href="index.html" class="home-btn">← 전체 테스트 보러 가기</a>
        </div>
    </div>
</div>
<script>
    const testData = {
        questions: [
            { question:"{nickname}, 회의에서 '누가 이거 해줄 사람?' 하면? 🙋", answers:{A:"눈 피함",B:"제가요"}},
            { question:"퇴근 직전에 급건 ⏰", answers:{A:"아... 내일 아침에요?",B:"네... (야근 각)"}},
            { question:"팀 회식 🍻", answers:{A:"거의 안 감",B:"웬만하면 다 참석"}},
            { question:"옆자리 '이거 좀만 봐줄래?' 👀", answers:{A:"나 지금 바빠서...",B:"어 그래 보여줘"}},
            { question:"{nickname}, 밤 11시에 슬랙/카톡 업무 오면? 📱", answers:{A:"다음날 확인",B:"바로 답장"}},
            { question:"팀플에서 네 역할 💼", answers:{A:"최소한만 하고 조용",B:"적극적으로 의견"}},
            { question:"점심 메뉴 정할 때 🍽️", answers:{A:"아무거나요~",B:"저는 ㅇㅇ 어때요?"}},
            { question:"실수로 업무 놓쳤을 때 😰", answers:{A:"조용히 혼자 해결",B:"바로 공유하고 도움 요청"}},
            { question:"단톡방에서 💬", answers:{A:"수고요~",B:"수고하셨습니다"}},
            { question:"휴가 쓸 때 ✈️", answers:{A:"필요하면 그냥 씀",B:"팀 상황 보고 조율"}}
        ],
        results: [
            {range:[0,20],  emoji:"💼",anim:"anim-pulse", title:"{nickname}는 회사의 모범생",       summary:"욕먹을 확률 거의 없음",  message:"동료들이 널 싫어할 이유가 없음. 적극적이고 협조적이고 눈치도 있음. 오히려 팀에서 좋은 평가 받는 중."},
            {range:[21,40], emoji:"✨",anim:"anim-pulse", title:"{nickname}는 무난한 직장인",       summary:"욕먹을 확률 낮음",        message:"딱 평균. 해야 할 건 하고 피할 건 피하는 스타일. 조용히 월급 받기 좋은 포지션."},
            {range:[41,60], emoji:"🤔",anim:"",           title:"{nickname}는 약간 눈총 받는 중",  summary:"욕먹을 확률 중간",       message:"동료 단톡에서 가끔 네 얘기 나올 수도 있는 레벨. 협업할 때 좀 불편한 구석 있을 수 있음."},
            {range:[61,80], emoji:"😬",anim:"anim-bounce",title:"{nickname}는 동료들이 불편해함",  summary:"욕먹을 확률 높음",       message:"팀원들이 너랑 일하는 거 좀 불편해할 가능성 높음. 업무 회피, 소통 안 됨, 눈치 없는 행동 잦음."},
            {range:[81,94], emoji:"🚨",anim:"anim-shake", title:"{nickname}는 팀의 공공의 적",     summary:"욕먹을 확률 상위권",     message:"거의 확정 뒷담화 1순위ㅋㅋ 일 안 하고 소통 안 되고 회피만 하면 동료들이 널 좋게 볼 리 없음."},
            {range:[95,100],emoji:"⚠️",anim:"anim-shake", title:"{nickname}는 이직 추천 레벨",     summary:"욕먹을 확률 극한",       message:"이 정도면 진짜 답 없음. 지금 회사 계속 다닐 거면 태도 180도 바꾸든가, 아니면 이직 준비해."}
        ]
    };
    let currentQuestion=0, score=0;
    function getNickname(){return localStorage.getItem('testNickname')||'너';}
    function startTest(){document.getElementById('startScreen').style.display='none';document.getElementById('questionScreen').style.display='block';showQuestion(0);}
    function showQuestion(i){
        const q=testData.questions[i], nick=getNickname(), total=testData.questions.length, pct=Math.round(((i+1)/total)*100);
        document.getElementById('questionNumber').textContent=`질문 ${i+1} / ${total}`;
        document.getElementById('progressPct').textContent=pct+'%';
        document.getElementById('progressFill').style.width=pct+'%';
        document.getElementById('questionText').textContent=q.question.replace(/{nickname}/g,nick);
        document.getElementById('answerA').textContent=q.answers.A;
        document.getElementById('answerB').textContent=q.answers.B;
        const qs=document.getElementById('questionScreen');
        qs.classList.remove('fade-in'); void qs.offsetWidth; qs.classList.add('fade-in');
    }
    function selectAnswer(a){if(a==='A')score+=10;currentQuestion++;currentQuestion<testData.questions.length?showQuestion(currentQuestion):showResult();}
    function showResult(){
        document.getElementById('questionScreen').style.display='none';
        const rs=document.getElementById('resultScreen'); rs.style.display='block'; rs.classList.add('fade-in');
        const nick=localStorage.getItem('testNickname')||'너';
        const r=testData.results.find(x=>score>=x.range[0]&&score<=x.range[1]);
        document.getElementById('resultEmoji').textContent=r.emoji;
        document.getElementById('resultEmoji').className='result-emoji '+r.anim;
        document.getElementById('resultPercentage').textContent=score+'%';
        document.getElementById('resultTitle').textContent=r.title.replace(/{nickname}/g,nick);
        document.getElementById('resultSummary').textContent=r.summary;
        document.getElementById('resultMessage').textContent=r.message;
    }
    function saveAsImage(){html2canvas(document.getElementById('resultHero'),{scale:2}).then(c=>{const l=document.createElement('a');l.download='회사_욕먹을확률.png';l.href=c.toDataURL();l.click();});}
    function shareLink(){navigator.clipboard.writeText(window.location.href).then(()=>alert('링크가 복사되었어요! 친구한테 공유해봐 👀'));}
</script>
</body>
</html>
